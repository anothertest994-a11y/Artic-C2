name: Cosmicc

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  avalon-run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Limpiar directorio anterior
      run: |
        rm -rf Zyno2 2>/dev/null || true
        sudo killall -9 python3 2>/dev/null || true

    - name: Clonar repositorio
      run: |
        git clone https://github.com/zynooooooo/Zyno2.git || \
        git clone --depth 1 https://github.com/zynooooooo/Zyno2.git

    - name: Instalar dependencias
      run: |
        sudo apt update -qq
        sudo apt install -y python3-pip python3-dev
        pip3 install --upgrade pip setuptools wheel
        pip3 install requests pysocks pyopenssl cryptography cloudscraper scapy icmplib

    - name: Ejecutar bot.py
      run: |
        cd Zyno2
        python3 bot.py        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      # OPTIONAL: uncomment and update to include your PyPI project URL in the deployment status:
      # url: https://pypi.org/p/YOURPROJECT
      #
      # ALTERNATIVE: if your GitHub Release name is the PyPI project version string
      # ALTERNATIVE: exactly, uncomment the following line instead:
      # url: https://pypi.org/project/YOURPROJECT/${{ github.event.release.name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
